{% extends "base.html" %}
{% block content %}
<style>
  .node-card { cursor: grab; }
  .node-card:active { cursor: grabbing; }
  .sortable-ghost {
    opacity: 0.4;
    background-color: #2d3748 !important;
    border: 2px dashed #4a5568 !important;
  }
</style>
<section class="panel">
  <h2>Vue temps reel des composts</h2>
  <p class="muted">Mesures des noeuds actifs (temperature + batterie).</p>
</section>
<section id="node-grid" class="card-grid"></section>
<div id="chart-modal" class="modal-backdrop hidden">
  <div class="modal-card">
    <div class="modal-header">
      <h3 id="modal-title">Detail temperature</h3>
      <button id="modal-close-btn" class="modal-close-btn">Fermer</button>
    </div>
    <div class="modal-controls">
      <label>
        Debut
        <input id="modal-start" type="text" placeholder="Choisir date/heure debut">
      </label>
      <label>
        Fin
        <input id="modal-end" type="text" placeholder="Choisir date/heure fin">
      </label>
      <button id="modal-apply-btn">Appliquer</button>
      <button id="modal-export-btn">Exporter CSV</button>
    </div>
    <div id="modal-chart" class="modal-chart"></div>
  </div>
</div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/fr.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="/static/dashboard.js"></script>
<script>
  // Initialisation du Drag & Drop sur la grille des noeuds
  document.addEventListener('DOMContentLoaded', () => {
    const grid = document.getElementById('node-grid');
    
    new Sortable(grid, {
      animation: 150,
      ghostClass: 'sortable-ghost', // Classe CSS pendant le déplacement
      onStart: function() {
        isDragging = true;
      },
      onEnd: function() {
        isDragging = false;
        // On récupère tous les éléments enfants qui ont un data-node-id
        const cards = grid.querySelectorAll('[data-node-id]');
        const orders = Array.from(cards).map((card, index) => ({
          id: parseInt(card.getAttribute('data-node-id')),
          order: index
        }));

        // Envoi du nouvel ordre au serveur
        fetch('/api/nodes/reorder', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(orders)
        }).catch(err => console.error("Erreur lors de la sauvegarde de l'ordre:", err));
      }
    });
  });
</script>
{% endblock %}
